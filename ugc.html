<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGC Photography — FIRST STEP STUDIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --luster: #FDFDFD;
      --blue: #85A1F2;
      --red: #EB4C42;
      --bg-deep: #0a0a12;
      --bg-card: rgba(253, 253, 253, 0.04);
      --glass-edge: rgba(253, 253, 253, 0.08);
      --glass-blur: blur(24px);
      --ease-fluid: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--luster);
      overflow-x: hidden;
      min-height: 100vh;
    }
    ::selection { background: var(--red); color: var(--luster); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

    .bg-shapes {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-shapes .shape {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
      animation: floatShape 20s infinite var(--ease-fluid);
    }
    .bg-shapes .shape:nth-child(1) { width: 500px; height: 500px; background: var(--blue); top: -10%; left: -5%; animation-delay: 0s; }
    .bg-shapes .shape:nth-child(2) { width: 400px; height: 400px; background: var(--red); bottom: -5%; right: -5%; animation-delay: -5s; }
    .bg-shapes .shape:nth-child(3) { width: 300px; height: 300px; background: var(--blue); top: 40%; left: 50%; animation-delay: -10s; opacity: 0.08; }
    .bg-shapes .shape:nth-child(4) { width: 200px; height: 200px; background: var(--red); top: 60%; left: 15%; animation-delay: -15s; opacity: 0.1; }
    .bg-shapes .shape:nth-child(5) { width: 350px; height: 350px; background: linear-gradient(135deg, var(--blue), var(--red)); top: 20%; right: 10%; animation-delay: -7s; opacity: 0.06; }
    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
      25% { transform: translate(60px, -40px) rotate(5deg) scale(1.05); }
      50% { transform: translate(-30px, 60px) rotate(-3deg) scale(0.95); }
      75% { transform: translate(40px, 30px) rotate(4deg) scale(1.02); }
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 40px;
      background: rgba(10, 10, 18, 0.6);
      backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-edge);
      display: flex; align-items: center; justify-content: space-between;
    }
    nav .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 1.3rem;
      background: linear-gradient(135deg, var(--luster), var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    nav a {
      display: flex; align-items: center; gap: 8px;
      color: rgba(253, 253, 253, 0.7); text-decoration: none; font-size: 0.85rem;
      padding: 8px 16px; border-radius: 100px;
      background: var(--bg-card); border: 1px solid var(--glass-edge);
      transition: all 0.3s var(--ease-fluid);
    }
    nav a:hover { border-color: var(--blue); color: var(--luster); }

    .hero {
      position: relative; z-index: 1;
      padding: 120px 24px 40px; text-align: center;
    }
    .hero .badge {
      display: inline-block; padding: 6px 20px;
      border: 1px solid var(--glass-edge); border-radius: 100px;
      font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(253,253,253,0.4); backdrop-filter: blur(12px); margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif; font-weight: 900;
      font-size: clamp(3rem, 8vw, 5rem);
      background: linear-gradient(135deg, var(--luster) 30%, var(--blue) 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero .sub {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.5rem; color: rgba(253,253,253,0.4); margin-top: 4px;
    }
    .hero .accent-line {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--red));
      margin: 16px auto 0; border-radius: 2px;
    }

    .body-content {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto; padding: 0 24px 60px;
    }
    .section-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label i { color: var(--blue); font-size: 0.9rem; }
    .section-label span { font-size: 0.7rem; color: rgba(253,253,253,0.3); font-family: 'Inter', sans-serif; }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; margin-bottom: 48px;
    }
    .video-card {
      border-radius: 20px; overflow: hidden;
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-edge);
      transition: all 0.4s var(--ease-fluid);
      cursor: pointer;
    }
    .video-card:hover {
      transform: translateY(-6px);
      border-color: rgba(133,161,242,0.2);
      box-shadow: 0 12px 48px rgba(133,161,242,0.08);
    }
    .video-card .thumb {
      position: relative; aspect-ratio: 16/9; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a12;
    }
    .video-card .thumb .thumb-img {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0; transition: opacity 0.5s var(--ease-smooth);
    }
    .video-card .thumb .thumb-img.loaded { opacity: 1; }
    .video-card .thumb .thumb-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; z-index: 1;
    }
    .video-card .thumb .thumb-loading i { font-size: 1.5rem; color: rgba(253,253,253,0.1); }
    .video-card .thumb .thumb-loading.hide { display: none; }
    .video-card .thumb .thumb-label {
      position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 2;
      padding: 6px 10px; border-radius: 8px;
      background: rgba(10,10,18,0.7); backdrop-filter: blur(8px);
      font-size: 0.7rem; color: rgba(253,253,253,0.7);
      text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
    }
    .video-card .thumb .thumb-label i { margin-right: 6px; color: var(--blue); }
    .video-card .thumb .play-overlay {
      position: absolute; inset: 0; z-index: 3;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10,10,18,0.35); opacity: 0; transition: opacity 0.3s;
    }
    .video-card:hover .thumb .play-overlay { opacity: 1; }
    .video-card .thumb .play-overlay .play-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(253,253,253,0.15); backdrop-filter: blur(12px);
      border: 1px solid rgba(253,253,253,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--luster); font-size: 1.2rem;
      transition: transform 0.3s var(--ease-spring);
    }
    .video-card:hover .thumb .play-overlay .play-btn { transform: scale(1.1); }
    .video-card .body { padding: 14px 16px; }
    .video-card .body .card-title { font-size: 0.85rem; font-weight: 600; color: rgba(253,253,253,0.7); }
    .video-card .body .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .video-card .body .card-meta span { font-size: 0.7rem; color: rgba(253,253,253,0.3); }

    .video-modal {
      position: fixed; inset: 0; z-index: 300;
      display: none; align-items: center; justify-content: center;
      background: rgba(10,10,18,0.9);
      backdrop-filter: blur(20px);
    }
    .video-modal.open { display: flex; }
    .video-modal .modal-bg { position: absolute; inset: 0; z-index: 0; cursor: pointer; }
    .video-modal .modal-content {
      position: relative; z-index: 1;
      width: 90%; max-width: 900px;
      border-radius: 20px; overflow: hidden;
      background: var(--bg-deep); border: 1px solid var(--glass-edge);
    }
    .video-modal .modal-content video { width: 100%; display: block; max-height: 80vh; }
    .video-modal .modal-close {
      position: absolute; top: 16px; right: 16px; z-index: 2;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(253,253,253,0.1); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-edge);
      color: var(--luster); font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s var(--ease-fluid);
    }
    .video-modal .modal-close:hover { background: var(--red); border-color: var(--red); }

    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .hero { padding: 100px 16px 30px; }
      .body-content { padding: 0 16px 40px; }
      .video-grid { grid-template-columns: repeat(2,1fr); gap: 12px; }
    }
    @media (max-width: 480px) { .video-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div>
  </div>

  <nav>
    <div class="logo">PORTFOLIO</div>
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </nav>

  <section class="hero">
    <div class="badge">Akram Mahdid</div>
    <h1>UGC Photography</h1>
    <p class="sub">تصوير</p>
    <div class="accent-line"></div>
  </section>

  <div class="body-content" id="bodyContent"></div>

  <div class="video-modal" id="videoModal">
    <div class="modal-bg" onclick="closeVideo()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeVideo()"><i class="fas fa-times"></i></button>
      <video id="modalVideo" controls playsinline></video>
    </div>
  </div>

  <script>
    const videos = [
      {
        icon: 'fa-box', label: 'Product Content', count: '3 projects',
        items: [
          { file: 'ugc/ads.mp4', name: 'Ads', ext: 'MP4', bg: '#1a2a3e,#2a4a6b' },
          { file: 'ugc/yasmina 4.mp4', name: 'Yasmina 4', ext: 'MP4', bg: '#2a1a3e,#4a2a6b' },
          { file: 'ugc/HOCO 2.MOV', name: 'HOCO 2', ext: 'MOV', bg: '#1a3e2a,#2a6b4a' },
        ]
      },
      {
        icon: 'fa-palm-tree', label: 'Brand Collaborations', count: '2 projects',
        items: [
          { file: 'ugc/NAKHLA 1.MP4', name: 'Nakhla 1', ext: 'MP4', bg: '#3e1a1a,#6b2a2a' },
          { file: 'ugc/NAKHLA.MOV', name: 'Nakhla', ext: 'MOV', bg: '#2a2a1a,#4a4a2a' },
        ]
      }
    ];

    function buildPage() {
      const container = document.getElementById('bodyContent');
      let html = '';
      videos.forEach(section => {
        html += `<div class="section-label"><i class="fas ${section.icon}"></i> ${section.label} <span>— ${section.count}</span></div>`;
        html += `<div class="video-grid">`;
        section.items.forEach(v => {
          html += `
            <div class="video-card" onclick="playVideo('${v.file}')">
              <div class="thumb">
                <div class="thumb-img" id="thumb-${v.file.replace(/[^a-zA-Z0-9]/g,'-')}"></div>
                <div class="thumb-loading" id="load-${v.file.replace(/[^a-zA-Z0-9]/g,'-')}"><i class="fas fa-circle-notch fa-spin"></i></div>
                <span class="thumb-label"><i class="fas fa-play-circle"></i> ${v.name}</span>
                <div class="play-overlay"><div class="play-btn"><i class="fas fa-play"></i></div></div>
              </div>
              <div class="body">
                <div class="card-title">${v.name}</div>
                <div class="card-meta"><span><i class="far fa-file-video"></i> ${v.ext}</span></div>
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      container.innerHTML = html;
      videos.forEach(section => {
        section.items.forEach(v => captureFrame(v.file, v.bg));
      });
    }

    function captureFrame(file, bg) {
      const id = file.replace(/[^a-zA-Z0-9]/g,'-');
      const img = document.getElementById('thumb-' + id);
      const loader = document.getElementById('load-' + id);
      if (!img) return;
      if (bg) img.style.background = 'linear-gradient(135deg,' + bg + ')';
      const vid = document.createElement('video');
      vid.preload = 'metadata'; vid.muted = true; vid.playsInline = true; vid.src = file;
      let done = false;
      const timeout = setTimeout(() => { if (!done) { done = true; if (loader) loader.classList.add('hide'); vid.remove(); } }, 8000);
      vid.addEventListener('loadeddata', () => { if (!done) { const t = Math.min(1, (vid.duration || 10) * 0.15); vid.currentTime = t; } });
      vid.addEventListener('seeked', () => {
        if (done) return; done = true; clearTimeout(timeout);
        try { const c = document.createElement('canvas'); c.width = 320; c.height = 180; c.getContext('2d').drawImage(vid, 0, 0, 320, 180); const url = c.toDataURL('image/jpeg', 0.7); img.style.backgroundImage = 'url(' + url + ')'; img.classList.add('loaded'); } catch(e) {}
        if (loader) loader.classList.add('hide'); vid.remove();
      });
      vid.addEventListener('error', () => { if (!done) { done = true; clearTimeout(timeout); if (loader) loader.classList.add('hide'); vid.remove(); } });
      vid.load();
    }

    const modal = document.getElementById('videoModal');
    const modalVideo = document.getElementById('modalVideo');
    function playVideo(src) { modalVideo.src = src; modal.classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeVideo() { modal.classList.remove('open'); modalVideo.pause(); modalVideo.src = ''; document.body.style.overflow = ''; }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideo(); });

    buildPage();
  </script>
</body>
</html>
